<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Экзамен · ТиО АФК — тест</title>
<style>
  :root{
    --bg:#13101b; --bg2:#1a1626; --card:#201b30; --card-h:#262036;
    --line:#322a47; --line2:#3d3357;
    --text:#ece8f5; --muted:#9b91b3; --faint:#6f6688;
    --amethyst:#a98bff; --amethyst-d:#7c5cf0; --amethyst-soft:rgba(169,139,255,.14);
    --ok:#54d49a; --ok-soft:rgba(84,212,154,.13); --ok-line:rgba(84,212,154,.5);
    --bad:#ff6b81; --bad-soft:rgba(255,107,129,.12); --bad-line:rgba(255,107,129,.5);
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 80% -10%, #221a36 0%, var(--bg) 55%) no-repeat, var(--bg);
    color:var(--text);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;padding:0 0 60px}
  .wrap{max-width:720px;margin:0 auto;padding:0 18px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--amethyst);font-weight:700;margin:0 0 8px}
  h1{font-size:clamp(24px,5vw,34px);margin:0;font-weight:800;letter-spacing:-.02em}
  .btn{appearance:none;cursor:pointer;border:1px solid var(--line2);background:var(--card);color:var(--text);
    border-radius:11px;padding:11px 16px;font-size:14px;font-weight:600;font-family:inherit;transition:.15s}
  .btn:hover{background:var(--card-h);border-color:var(--amethyst-d)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--amethyst-d);border-color:var(--amethyst-d);color:#fff}
  .btn.primary:hover{background:var(--amethyst)}
  .btn.ghost{color:var(--muted)}

  /* старт */
  #start{padding:48px 0}
  #start .sub{color:var(--muted);margin:12px 0 26px;font-size:15px}
  .seg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .seg label{flex:1;min-width:64px}
  .seg input{position:absolute;opacity:0;pointer-events:none}
  .seg span{display:block;text-align:center;cursor:pointer;border:1px solid var(--line2);background:var(--card);
    border-radius:11px;padding:13px 0;font-weight:700;transition:.15s}
  .seg input:checked+span{background:var(--amethyst-soft);border-color:var(--amethyst);color:var(--amethyst)}
  .lbl{font-size:13px;color:var(--faint);margin:18px 0 8px;text-transform:uppercase;letter-spacing:.08em}
  .best{margin-top:18px;color:var(--faint);font-size:13px}

  /* квиз */
  #quiz{padding:26px 0;display:none}
  .top{display:flex;align-items:center;gap:14px;margin-bottom:8px}
  .top .pos{font-size:13px;color:var(--muted);font-weight:600}
  .top .sc{margin-left:auto;font-size:13px;color:var(--faint)}
  .bar{height:6px;background:#2a2340;border-radius:99px;overflow:hidden;margin-bottom:24px}
  .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amethyst-d),var(--amethyst));transition:width .3s}
  .qtext{font-size:20px;font-weight:700;letter-spacing:-.01em;margin-bottom:20px;min-height:54px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{cursor:pointer;text-align:left;border:1px solid var(--line2);background:var(--card);color:var(--text);
    border-radius:12px;padding:14px 16px;font-size:15px;font-weight:500;font-family:inherit;
    display:flex;gap:12px;align-items:flex-start;transition:.12s}
  .opt:hover:not(.locked){background:var(--card-h);border-color:var(--amethyst-d)}
  .opt .key{flex:none;width:24px;height:24px;border-radius:7px;background:var(--bg2);border:1px solid var(--line2);
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted)}
  .opt.locked{cursor:default}
  .opt.correct{border-color:var(--ok-line);background:var(--ok-soft)}
  .opt.correct .key{background:var(--ok);border-color:var(--ok);color:#10231a}
  .opt.wrong{border-color:var(--bad-line);background:var(--bad-soft)}
  .opt.wrong .key{background:var(--bad);border-color:var(--bad);color:#2a0d12}
  .expl{margin-top:16px;padding:13px 15px;background:var(--bg2);border:1px solid var(--line);
    border-left:3px solid var(--amethyst);border-radius:10px;font-size:14px;color:#d7d0ea;display:none}
  .expl.show{display:block}
  .expl b{color:var(--amethyst);font-size:11px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:5px}
  .nav{margin-top:22px;display:flex;justify-content:flex-end}
  .nav .btn{display:none}
  .nav .btn.show{display:inline-block}

  /* результат */
  #result{padding:40px 0;display:none}
  .score-big{font-size:64px;font-weight:800;letter-spacing:-.03em;line-height:1}
  .score-big em{font-style:normal;color:var(--muted);font-size:28px}
  .grade{display:inline-block;margin-top:10px;padding:5px 14px;border-radius:99px;font-weight:700;font-size:14px}
  .verdict{color:var(--muted);margin:14px 0 24px;font-size:15px}
  .rbtns{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:30px}
  .review h3{font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin:0 0 12px}
  .rev{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--bad);border-radius:11px;padding:14px 16px;margin-bottom:10px}
  .rev .rq{font-weight:600;margin-bottom:8px;font-size:15px}
  .rev .ra{font-size:14px;color:#d7d0ea}
  .rev .ra .tag{color:var(--ok);font-weight:700}
  .allok{color:var(--ok);font-weight:600}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <section id="start">
    <p class="eyebrow">Экзамен · самопроверка</p>
    <h1>Тест по ТиО АФК</h1>
    <p class="sub">Один вопрос — четыре варианта, один верный. Сразу видно правильно/неправильно с пояснением. В конце — оценка и разбор ошибок.</p>

    <div class="lbl">Сколько вопросов</div>
    <div class="seg" id="seg">
      <label><input type="radio" name="cnt" value="10"><span>10</span></label>
      <label><input type="radio" name="cnt" value="20" checked><span>20</span></label>
      <label><input type="radio" name="cnt" value="40"><span>40</span></label>
      <label><input type="radio" name="cnt" value="70"><span>Все 70</span></label>
    </div>

    <div style="margin-top:24px"><button class="btn primary" id="begin" style="width:100%;padding:15px">Начать тест</button></div>
    <div class="best" id="best"></div>
  </section>

  <section id="quiz">
    <div class="top">
      <span class="pos" id="pos">Вопрос 1 из 20</span>
      <span class="sc" id="sc">Верно: 0</span>
    </div>
    <div class="bar"><i id="bar"></i></div>
    <div class="qtext" id="qtext"></div>
    <div class="opts" id="opts"></div>
    <div class="expl" id="expl"><b>Пояснение</b><span id="explText"></span></div>
    <div class="nav"><button class="btn primary" id="next">Далее</button></div>
  </section>

  <section id="result">
    <p class="eyebrow">Результат</p>
    <div class="score-big"><span id="rScore">0</span><em> / <span id="rTotal">20</span></em></div>
    <span class="grade" id="grade"></span>
    <p class="verdict" id="verdict"></p>
    <div class="rbtns">
      <button class="btn primary" id="again">Пройти заново</button>
      <button class="btn" id="retryWrong">Только ошибки</button>
      <button class="btn ghost" id="home">В начало</button>
    </div>
    <div class="review" id="review"></div>
  </section>

</div>

<script>
const ALL = [{"q": "Цель адаптивной физической культуры —", "opts": ["максимально возможное развитие жизнеспособности человека с устойчивыми отклонениями в здоровье", "полное излечение основного дефекта средствами спорта", "достижение высших спортивных результатов любой ценой", "замена медицинской реабилитации"], "c": 0, "e": "Цель — развитие жизнеспособности и самореализация, а не излечение дефекта."}, {"q": "К специфическим задачам АФК относятся:", "opts": ["финансовые и кадровые", "только оздоровительные", "коррекционные, компенсаторные, профилактические", "только образовательные"], "c": 2, "e": "Специфика АФК — коррекция, компенсация, профилактика."}, {"q": "Коррекция в АФК — это:", "opts": ["исправление нарушенных функций средствами физических упражнений", "возмещение утраченной функции за счёт сохранных", "предупреждение вторичных нарушений", "восстановление после соревнований"], "c": 0, "e": "Коррекция = исправление функции; возмещение — это уже компенсация."}, {"q": "Компенсация в АФК — это:", "opts": ["исправление дефекта осанки", "развитие максимальной силы", "профилактика простуд", "возмещение нарушенной функции за счёт сохранных систем"], "c": 3, "e": "Компенсация — замещение функции сохранными системами (слух/осязание при слепоте)."}, {"q": "Профилактическая задача АФК направлена на:", "opts": ["предупреждение сопутствующих заболеваний и вторичных отклонений", "классификацию по нозологиям", "установление группы инвалидности", "спортивный отбор"], "c": 0, "e": "Профилактика предупреждает вторичные отклонения (осанка, ожирение при гиподинамии)."}, {"q": "Сколько основных видов АФК выделяют?", "opts": ["четыре", "семь", "три", "два"], "c": 0, "e": "АФВ, адаптивный спорт, двигательная рекреация, физическая реабилитация."}, {"q": "Адаптивная двигательная рекреация прежде всего направлена на:", "opts": ["формирование базовых учебных навыков", "активный отдых, оздоровление и удовольствие от движения", "восстановление после травмы по назначению врача", "достижение спортивного результата"], "c": 1, "e": "Рекреация = отдых, оздоровление, удовольствие."}, {"q": "Адаптивная физическая реабилитация — это:", "opts": ["восстановление нарушенных функций после болезни или травмы", "активный туризм", "творческое самовыражение", "соревновательная деятельность"], "c": 0, "e": "Реабилитация восстанавливает нарушенные функции."}, {"q": "Креативные виды АФК удовлетворяют потребность в:", "opts": ["самовыражении и творческом саморазвитии", "соревновании за медали", "остром риске и преодолении страха", "максимальной силовой нагрузке"], "c": 0, "e": "Художественно-музыкальные практики — самовыражение, эмоции, творчество."}, {"q": "Экстремальные виды АФК удовлетворяют потребность в:", "opts": ["острых ощущениях и преодолении психологических барьеров", "художественном самовыражении", "восстановлении функций после травмы", "получении базовых знаний"], "c": 0, "e": "Экстрим — риск, испытание себя, рост самооценки."}, {"q": "Нозологическая группа — это классификация инвалидов по:", "opts": ["возрасту", "спортивному разряду", "виду нарушения/заболеванию (зрение, слух, интеллект, ПОДА и др.)", "месту жительства"], "c": 2, "e": "Нозология = по характеру нарушения."}, {"q": "Типичное нарушение двигательной сферы при отклонениях в здоровье:", "opts": ["повышение всех физических качеств", "только нарушение речи", "снижение силы, координации, нарушения осанки и равновесия", "отсутствие любых ограничений"], "c": 2, "e": "Характерны снижение силы/координации, контрактуры, гиподинамия."}, {"q": "Ключевое профессиональное требование к педагогу АФК:", "opts": ["разряд по тяжёлой атлетике", "знание иностранного языка", "опыт работы только со здоровыми", "владение методикой АФК, страховкой и первой помощью"], "c": 3, "e": "Нужны знание патологии, методики АФК, навыки страховки и первой помощи."}, {"q": "Сток-Мандевильские игры — старт международного спорта инвалидов — прошли в:", "opts": ["1896 году", "1980 году", "1924 году", "1948 году"], "c": 3, "e": "1948 г., Л. Гутман; первые Паралимпийские игры — 1960, Рим."}, {"q": "АФК как наука и специальность в России оформилась:", "opts": ["в 2010-е годы", "в 1990-е годы (С.П. Евсеев)", "до революции 1917 года", "в 1920-е годы"], "c": 1, "e": "Специальность и кафедры АФК — с 1990-х."}, {"q": "В каких видах российские паралимпийцы традиционно сильны?", "opts": ["кёрлинг и гольф", "лыжные гонки, биатлон, лёгкая атлетика, плавание", "автоспорт", "бейсбол и регби"], "c": 1, "e": "Лидерство — лыжи, биатлон, лёгкая атлетика, плавание, фехтование на колясках."}, {"q": "Международный паралимпийский комитет обозначается аббревиатурой:", "opts": ["ФИФА", "ICSD", "ВОЗ", "МПК / IPC"], "c": 3, "e": "МПК (IPC); ICSD — комитет спорта глухих."}, {"q": "Адаптивное физическое воспитание организуется прежде всего в:", "opts": ["кардиосанаториях", "фитнес-клубах для здоровых", "хирургических стационарах", "коррекционных и инклюзивных школах, детсадах, вузах"], "c": 3, "e": "АФВ — образовательные учреждения по адаптированным программам."}, {"q": "Базовое звено подготовки в адаптивном спорте:", "opts": ["общеобразовательная школа", "поликлиника", "дом культуры", "ДЮСАШ и спортивные клубы инвалидов"], "c": 3, "e": "Детско-юношеские спортивно-адаптивные школы и клубы."}, {"q": "Адаптивная двигательная рекреация реализуется через:", "opts": ["операционные отделения", "военные сборы", "клубы, туризм, фестивали, оздоровительные мероприятия", "только индивидуальные занятия ЛФК"], "c": 2, "e": "Рекреация — досуг, туризм, праздники."}, {"q": "Физическая реабилитация в России носит характер:", "opts": ["этапный (стационар — поликлиника — санаторий)", "одноразовый", "исключительно домашний", "только соревновательный"], "c": 0, "e": "Реабилитация этапная, по ИПР."}, {"q": "В комплексной реабилитации АФК выполняет роль:", "opts": ["юридического сопровождения", "только досуга", "связующего звена между медицинским и социальным аспектами", "замены медикаментозного лечения"], "c": 2, "e": "АФК работает на всех э , {"q": "Самодеятельная форма рекреации — это:", "opts": ["официальное соревнование", "занятие с тренером в клубе", "самостоятельные занятия, прогулки, игры в семье", "урок в школе"], "c": 2, "e": "Организованные (клубы/праздники) vs самодеятельные (самостоятельно)."}, {"q": "Главная цель адаптивного спорта:", "opts": ["восстановление после операции", "получение базовых знаний", "отдых и развлечение", "максимальная самореализация в соревновательной деятельности"], "c": 3, "e": "Самореализация и спортивный результат."}, {"q": "Ведущая функция адаптивного спорта:", "opts": ["рекреативная как главная", "соревновательная", "лечебно-восстановительная как главная", "образовательная как главная"], "c": 1, "e": "Соревновательная, спортивная, интегративная, зрелищная."}, {"q": "Паралимпийское движение строится как:", "opts": ["форма рекреации", "система лечебной физкультуры", "модель олимпийского спорта, адаптированная под нозологии", "художественная практика"], "c": 2, "e": "Те же виды/правила/ценности с классификацией."}, {"q": "Спортивно-медицинская классификация паралимпийцев нужна, чтобы:", "opts": ["распределить призовой фонд", "уравнять функциональные возможности соперников", "определить группу инвалидности", "назначить лечение"], "c": 1, "e": "Деление на классы по функциональным возможностям."}, {"q": "Следж-хоккей и кёрлинг на колясках входят в программу:", "opts": ["зимних Паралимпийских игр", "Специальной Олимпиады", "Сурдлимпийских игр", "летних Паралимпийских игр"], "c": 0, "e": "Это зимние паралимпийские виды."}, {"q": "Специальная Олимпиада (Special Olympics) предназначена для лиц с нарушением:", "opts": ["слуха", "зрения", "интеллекта", "опорно-двигательного аппарата"], "c": 2, "e": "Special Olympics — интеллектуальные нарушения."}, {"q": "Главный принцип Специальной Олимпиады:", "opts": ["отбор по разрядам", "участвуют только рекордсмены", "побеждает сильнейший любой ценой", "участие важнее победы, поощряется каждый"], "c": 3, "e": "Массовость и ценность участия."}, {"q": "Дивизионы в Специальной Олимпиаде формируются по:", "opts": ["росту и весу", "полу, возрасту и уровню подготовленности", "стажу занятий", "месту жительства"], "c": 1, "e": "Чтобы соревновались равные по силам."}, {"q": "На играх Специальной Олимпиады участники 4–8 мест получают:", "opts": ["ничего", "золотые медали", "наградные ленты", "денежные призы"], "c": 2, "e": "1–3 места — медали, 4–8 — ленты, награждаются все."}, {"q": "Программа «Объединённый спорт» (Unified Sports) — это:", "opts": ["команды из спортсменов с инвалидностью и без неё", "программа для глухих", "индивидуальные старты", "соревнования только тяжёлых форм"], "c": 0, "e": "Совместные команды; MATP — для тяжёлых форм."}, {"q": "Первые Всемирные игры глухих состоялись в:", "opts": ["1948 году в Лондоне", "1924 году в Париже", "1980 году в Москве", "1960 году в Риме"], "c": 1, "e": "1924, Париж; ныне Сурдлимпийские, проводит ICSD."}, {"q": "Главная цель креативных видов АФК:", "opts": ["завоевание медалей", "восстановление после операции", "творческое саморазвитие и самовыражение", "преодоление смертельного риска"], "c": 2, "e": "Самовыражение, эмоции, коррекция психики."}, {"q": "Главная цель экстремальных видов АФК:", "opts": ["получение базовых знаний", "лечение медикаментами", "преодоление страхов и повышение самооценки", "художественное самовыражение"], "c": 2, "e": "Испытание себя, психологическая реабилитация."}, {"q": "К средствам креативных практик относятся:", "opts": ["стрельба", "тяжёлая атлетика", "скалолазание и дайвинг", "танце-двигательная терапия, ритмопластика, психогимнастика"], "c": 3, "e": "Музыкально-двигательные средства, образ и импровизация."}, {"q": "Ключевая особенность методики экстремальных видов:", "opts": ["отказ от страховки ради остроты", "строгое обеспечение безопасности и постепенность", "максимальный риск без подготовки", "запрет на психологическую подготовку"], "c": 1, "e": "Безопасность, постепенное усложнение, психоподготовка."}];
const KEY = "afk_test_best_v1";
const $ = s => document.querySelector(s);
const LETTERS = ["А","Б","В","Г"];

let pool=[], idx=0, score=0, wrong=[], answered=false;

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildPool(items){
  // items: массив объектов вопросов; перемешиваем порядок и варианты
  return shuffle(items).map(it=>{
    const opts = shuffle(it.opts.map((t,i)=>({t,correct:i===it.c})));
    return {q:it.q, e:it.e, opts, ci:opts.findIndex(o=>o.correct)};
  });
}

function start(items){
  pool = buildPool(items);
  idx=0; score=0; wrong=[];
  $("#start").style.display="none";
  $("#result").style.display="none";
  $("#quiz").style.display="block";
  renderQ();
}

function renderQ(){
  answered=false;
  const it = pool[idx];
  $("#pos").textContent = `Вопрос ${idx+1} из ${pool.length}`;
  $("#sc").textContent = `Верно: ${score}`;
  $("#bar").style.width = (idx/pool.length*100)+"%";
  $("#qtext").textContent = it.q;
  $("#expl").classList.remove("show");
  $("#next").classList.remove("show");

  const box=$("#opts"); box.innerHTML="";
  it.opts.forEach((o,i)=>{
    const b=document.createElement("button");
    b.className="opt";
    b.innerHTML=`<span class="key">${LETTERS[i]}</span><span>${esc(o.t)}</span>`;
    b.addEventListener("click",()=>choose(i,b));
    box.appendChild(b);
  });
}

function choose(i,btn){
  if(answered) return;
  answered=true;
  const it=pool[idx];
  const nodes=$("#opts").querySelectorAll(".opt");
  nodes.forEach(n=>n.classList.add("locked"));
  nodes[it.ci].classList.add("correct");
  if(i===it.ci){ score++; }
  else{ btn.classList.add("wrong"); wrong.push({q:it.q,a:it.opts[it.ci].t,e:it.e}); }
  $("#sc").textContent=`Верно: ${score}`;
  $("#explText").textContent=it.e;
  $("#expl").classList.add("show");
  $("#next").classList.add("show");
  $("#next").textContent = (idx===pool.length-1) ? "Показать результат" : "Далее";
  $("#next").focus();
}

$("#next").addEventListener("click",()=>{
  if(idx<pool.length-1){ idx++; renderQ(); }
  else finish();
});

function finish(){
  $("#quiz").style.display="none";
  $("#result").style.display="block";
  const total=pool.length, pct=Math.round(score/total*100);
  $("#rScore").textContent=score; $("#rTotal").textContent=total;

  let g,gc,gb,v;
  if(pct>=85){g="Отлично";gc="#10231a";gb="var(--ok)";v="Материал освоен — можно идти на экзамен.";}
  else if(pct>=70){g="Хорошо";gc="#fff";gb="var(--amethyst-d)";v="Крепкая база, повтори темы из ошибок.";}
  else if(pct>=50){g="Удовлетворительно";gc="#2a1c08";gb="#e0a83a";v="Половину знаешь, разбери ошибки и пройди ещё раз.";}
  else {g="Слабо";gc="#2a0d12";gb="var(--bad)";v="Стоит вернуться к тренажёру и повторить теорию.";}
  const ge=$("#grade"); ge.textContent=g; ge.style.background=gb; ge.style.color=gc;
  $("#verdict").textContent=v;

  // лучший результат
  try{
    const best=JSON.parse(localStorage.getItem(KEY)||"null");
    if(!best || pct>best.pct){ localStorage.setItem(KEY, JSON.stringify({pct,total,ts:Date.now()})); }
  }catch(e){}

  const rev=$("#review");
  if(wrong.length===0){ rev.innerHTML='<p class="allok">Ни одной ошибки 🎯</p>'; return; }
  rev.innerHTML='<h3>Разбор ошибок ('+wrong.length+')</h3>'+wrong.map(w=>
    `<div class="rev"><div class="rq">${esc(w.q)}</div>
     <div class="ra"><span class="tag">Верно:</span> ${esc(w.a)}<br><span style="color:var(--muted)">${esc(w.e)}</span></div></div>`
  ).join("");
}

$("#again").addEventListener("click",()=>start(currentItems()));
$("#retryWrong").addEventListener("click",()=>{
  if(!wrong.length) return start(currentItems());
  const set=new Set(wrong.map(w=>w.q));
  start(ALL.filter(it=>set.has(it.q)));
});
$("#home").addEventListener("click",()=>{ $("#result").style.display="none"; $("#start").style.display="block"; showBest(); });
$("#begin").addEventListener("click",()=>{
  const n=+document.querySelector('input[name=cnt]:checked').value;
  start(shuffle(ALL).slice(0,n));
});

let lastN=20;
function currentItems(){ return shuffle(ALL).slice(0,lastN); }
$("#seg").addEventListener("change",e=>{ lastN=+e.target.value; });

function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function showBest(){
  try{ const b=JSON.parse(localStorage.getItem(KEY)||"null");
    $("#best").textContent = b ? `Лучший результат: ${b.pct}%` : ""; }catch(e){}
}
showBest();
</script>
</body>
